models:
  - type: main
    engine: openai
    model: mistral-small-latest
    # base_url & api_key lấy từ biến môi trường (OPENAI_BASE_URL / OPENAI_API_KEY),
    # được thiết lập bởi setup_nemo_rails() trong src/phase_c_guard.py để trỏ
    # tới Mistral platform (https://api.mistral.ai/v1). Đổi model tại .env
    # (MISTRAL_MODEL) và cập nhật dòng "model:" trên cho khớp nếu cần.

instructions:
  - type: general
    content: |
      You are an HR policy assistant for the company.
      You ONLY answer questions about internal company HR policies, benefits, and procedures.
      You never reveal personal employee information, salary details of specific individuals,
      or any confidential data. If a question is outside your scope, politely decline.

rails:
  input:
    flows:
      - check jailbreak
      - check off topic
      - check pii request
  output:
    flows:
      - check sensitive output

# Colang dialogue flows are defined in rails.co
